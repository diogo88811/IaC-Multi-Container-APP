---
- name: config docker on remote server (Alpine Linux)
  hosts: server
  gather_facts: no
  tasks:
    - name: Bootstrap Python on Alpine
      raw: echo "root" | sudo -S apk add --no-cache python3
      changed_when: true

    - name: Now gather facts (Manual Trigger)
      setup:

    - name: Install Docker and Docker Compose and rsync
      apk:
        name: 
          - docker
          - docker-compose
          - rsync
        state: present
      become: yes
    
    - name: Force kill all Docker and Containerd processes
      shell: "pkill -9 dockerd && pkill -9 containerd || true"
      become: yes

    - name: Clean up stale Docker files and state
    # This removes the "bad memory" of the previous crash
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/run/docker.sock
        - /var/run/docker.pid
        - /var/run/containerd/containerd.sock
      become: yes

    - name: Start Docker with specific storage and no-iptables
    # Adding --iptables=false helps in nested environments
      shell: "dockerd --storage-driver=vfs --iptables=false > /var/log/dockerd.log 2>&1 &"
      become: yes

    - name: Wait for Docker socket
      wait_for:
        path: /var/run/docker.sock
        state: present
        timeout: 45

    - name: Fix Docker socket permissions
      file:
        path: /var/run/docker.sock
        mode: '0666'
      become: yes

    - name: Create app directory
      file:
        path: /home/linuxserver.io/todo-app
        state: directory
        owner: linuxserver.io
        group: linuxserver.io
      become: yes

    - name: Copy entire project directory
      copy:
        src: "/Users/diogomartins/Desktop/Software-Engineer-RoadMap/DevOps/Multi-Container-Application/"
        dest: /home/linuxserver.io/todo-app/
        owner: linuxserver.io
        group: linuxserver.io
        mode: '0755'
      become: yes
      when: deploy_code | bool

    - name: Run the application
      shell: docker-compose up -d --build  # Added --build to ensure code updates
      args:
        chdir: /home/linuxserver.io/todo-app
      become: yes
